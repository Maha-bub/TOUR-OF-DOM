<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Like Github delete confirmation</title>
</head>
<body>
    <h2 id="secret-info">My secret Information</h2>
    <input type="text" name="" id="secret-messege"> <br> <br>
    <button id="btn-delete" disabled>Delete</button>
    <script>
        document.getElementById('secret-messege').addEventListener('keyup',function(event){
            const messege=event.target.value;
           
            console.log(messege);
            const deleteButton=document.getElementById('btn-delete');
            if(messege==='delete'){
                deleteButton.removeAttribute('disabled');
                
            }
            else{
                deleteButton.setAttribute('disabled',true);
            }

        })
        document.getElementById('btn-delete').addEventListener('click',function (){
            const secret=document.getElementById('secret-info');
            secret.style.display='none';
        })
    </script>
</body>
</html>
