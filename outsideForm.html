<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form open in new window</title>
</head>

<body>
    <form action="#" name="form"
        style="width:30%; border-radius: 10px; margin:0px auto; border: 2px solid rgb(64, 94, 105);background: #8eb5bec1; padding:10px">

        <div>Name<br />

            <input type="text" name="Text" />
        </div>
        <br><br>

        <div>Email<br />
            <textarea name="email"></textarea>
        </div>
        <br><br>

        <div>Address<br />
            <textarea name="address"></textarea>
        </div>
        <br><br>

        <div>Courses:
            <select name="option" id="">
                <option name="option" value="HTML">BBA</option>
                <option name="option" value="CSS">MBA</option>
                <option name="option" value="JavaScript">CIS</option>
                <option name="option" value="PHP">EEE</option>
                <option name="option" value="Laravel">Laravel</option>
            </select>

        </div>
        <br>

        <div>
            <div>Gender:
                Male<input type="radio" name="gender" value="Male" />
                Female<input type="radio" name="gender" value="Female" />
            </div>
        </div>
        <div>Subject:
            English<input type="checkbox" value="English" name="chkSubject" />
            Bengali<input type="checkbox" value="Bengali" name="chkSubject" />

            Math<input type="checkbox" value="Math" name="chkSubject" />
        </div>
        <br>

        <input type="button" onclick="newWindow()" value="Submit" />





    </form>
    <script language="javascript">
        function newWindow() {
            var name = document.form.Text.value;
            if(name ==""){
                alert("Please fill-up name field")
            }


            var address = document.form.address.value;
            if(address ==""){
                alert("Please fil the field")
            }


            // email validation
            var email = document.form.email.value;
            let Courses = document.form.option.value;
            if (email == "") {
                alert("Email required");
                return false;
            }

            if (email.indexOf("@") ==-1  || email.indexOf(".") == -1) {
                alert("Invalid Email");
                return false;
            }





            // cheked for gender elements
            var Gender = "";
            for (i = 0; i < document.form.gender.length; i++) {
                if (document.form.gender[i].checked) {
                    Gender = document.form.gender[i].value;
                }

            }

            // subject value checked and store data in another window
            let subject = " ";
            for (j = 0; j < document.form.chkSubject.length; j++) {

                if (document.form.chkSubject[j].checked) {
                    subject += document.form.chkSubject[j].value + ", ";
                }
            }
            doc = window.open("", "", 'width=400px,height=400px',);
            doc.document.write("Name:" + name + "<br>")
            doc.document.write("Address:" + address + "<br>")
            doc.document.write("Email:" + email + "<br>")
            doc.document.write("Gender:" + Gender + "<br>")
            doc.document.write("Course:" + Courses + "<br>")
            doc.document.write("Subject:" + subject + "<br/>");
            doc.document.write("<input type='button' value='Close me' onclick='self.close();' />");
            doc.document.write("<input type='button' value='Print' onclick='self.print();' />");




        };


    </script>
</body>

</html>
